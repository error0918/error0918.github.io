<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
    <style>
      ::-webkit-scrollbar {
        display: none;
      }

      body {
        padding: 0px;
        margin: 0px;
        font-family: 'Jua', sans-serif;
        background: linear-gradient( to bottom, #FBC2EB, #A6C1EE );
      }

      header {
       position: fixed;
       top: 0;
       left: 0;
       right: 0;
       height: 100px;
       padding-left: 20px;
       background: linear-gradient( to right, #334499, #4455BB );
       color: white;
       box-shadow: 0px 5px 50px 1px grey;
       display: flex;
       justify-content: left;
       align-items: center;
       z-index: 1;
     }

     main {
       padding-top: 100px;
     }

     footer {
       height: 50px;
       background: linear-gradient( to right, #334499, #4455BB );
       color: white;
       box-shadow: 0px -5px 50px 1px grey;
       display: flex;
       justify-content: center;
       align-items: center;
     }

     .card {
       width: 700px;
       height: 400px;
       margin: 50px auto;
       background: linear-gradient( to right, #F5F7FA, #E2EBF0 );
       border: 1px solid grey;
       position: relative;
       border-radius: 20px 20px 20px 20px / 20px 20px 20px 20px;
       box-shadow: 0px 0px 50px 1px grey;
     }

     .card-title {
       width: 660px;
       height: 50px;
       padding: 20px;
       background: linear-gradient( to right, #334499, #4455BB );
       color: white;
       border-radius: 20px 20px 0px 0px / 20px 20px 0px 0px;
       display: flex;
       font-size: 30px;
       justify-content: center;
       align-items: center;
     }

     .card-text {
       padding-left: 20px;
       padding-right: 20px;
       font-size: 20px;
     }

     .card-go {
       width: 80px;
       height: 40px;
       position: absolute;
       bottom: 20px;
       right: 20px;
     }

     .card-go-button {
       width: 100%;
       height: 100%;
       display: flex;
       justify-content: center;
       align-items: center;
       border-radius: 20px 20px 20px 20px / 20px 20px 20px 20px;
       background: #FF9977;
       color: black;
     }

     .fab {
       width: 100px;
       height: 100px;
       position: fixed;
       bottom: 50px;
       right: 50px;
     }

     .fab-button {
       width: 100%;
       height: 100%;
       display: flex;
       justify-content: center;
       align-items: center;
       background: #FF9977;
       border: 1px solid black;
       border-radius: 20px 20px 20px 20px / 20px 20px 20px 20px;
       box-shadow: 0px 0px 50px 1px grey;
     }
    </style>

    <title>Error0918</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/113190558?v=4">
  </head>
